name = "coupang-price-worker"
main = "src/index.ts"
compatibility_date = "2026-06-23"

# D1 생성 후 database_id를 실제 값으로 교체하세요.
[[d1_databases]]
binding = "DB"
database_name = "lyri_price_monitor"
#database_id = "REPLACE_WITH_DATABASE_ID"
database_id = "7a761c1a-5530-4ce3-88ee-9044acd59cec"

[vars]
ALLOWED_ORIGIN = "https://studio.lyrisudabang.com"

#ALLOWED_ORIGIN = "http://localhost:5173"

# API_TOKEN은 공개 저장소에 두지 않는 것을 권장합니다.
# 운영에서는 `wrangler secret put API_TOKEN` 사용 권장.
API_TOKEN = "CHANGE_ME_FOR_DEV_ONLY"

# UTC 기준. 0 0 * * * = KST 09:00
[triggers]
crons = ["0 0 * * *"]
